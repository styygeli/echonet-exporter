# Home Air Conditioner (Daikin, Mitsubishi, etc.) - ECHONET Object 0x013001
eoj: [0x01, 0x30, 0x01]
description: "Home air conditioner"

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status: 0x30=ON, 0x31=OFF."
    size: 1
    scale: 1
    type: gauge
  - epc: 0xBB
    name: indoor_temperature_celsius
    help: "Indoor temperature in °C."
    size: 2
    scale: 0.1
    invalid: 0x7FFF
    type: gauge
  - epc: 0xB3
    name: set_temperature_celsius
    help: "Target temperature in °C."
    size: 1
    scale: 1
    type: gauge
  - epc: 0xB0
    name: operation_mode
    help: "Operation mode (auto/cool/heat/dry etc) as numeric EPC value."
    size: 1
    scale: 1
    type: gauge
